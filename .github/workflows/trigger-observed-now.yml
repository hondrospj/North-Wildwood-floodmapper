name: Data refresh

on:
  push:
    paths:
      - .github/workflows/trigger-observed-now.yml
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
      - name: Start workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run update-observed.yml --ref main
