name: Trigger observed update now

on:
  push:
    paths:
      - .github/workflows/trigger-observed-now.yml
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  trigger-observed:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch existing observed workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run update-observed.yml --ref main
