name: Rebuild pre-2007 Lewes archive

on:
  push:
    paths:
      - .github/workflows/update-lewes-archive.yml
      - tools/update_lewes_archive.py
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: north-wildwood-lewes-archive
  cancel-in-progress: false

jobs:
  rebuild-lewes-archive:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pull verified NOAA Lewes hourly archive and six-minute gap fills
        run: python3 tools/update_lewes_archive.py

      - name: Commit rebuilt archive when NOAA data changed
        shell: bash
        run: |
          if git diff --quiet -- lewes_hourly.json; then
            echo "Lewes archive is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lewes_hourly.json
          git commit -m "Rebuild pre-2007 Lewes archive"
          git pull --rebase --autostash origin main
          git push
