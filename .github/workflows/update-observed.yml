name: Update North Wildwood observed

on:
  push:
    paths:
      - .github/workflows/update-observed.yml
      - tools/update_observed_15min.py
      - tools/update_historic_crests.py
  schedule:
    - cron: "37 4,5 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: north-wildwood-data-updates-v2
  cancel-in-progress: false

jobs:
  update-observed:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update 15-minute and hourly archives
        run: python3 tools/update_observed_15min.py --update-hourly

      - name: Update official USGS historic crests
        run: python3 tools/update_historic_crests.py

      - name: Commit archive updates
        shell: bash
        run: |
          if git diff --quiet -- observed.json observed15min.json toptides.json; then
            echo "Observed archives and historic crests are already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add observed.json observed15min.json toptides.json
          git commit -m "Update North Wildwood observed archives"
          git pull --rebase --autostash origin main
          git push
